<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZPL Label Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES
============================================================ */
:root {
  --bg:         #0f1117;
  --surface:    #1a1d27;
  --surface2:   #22263a;
  --border:     #2e3250;
  --accent:     #4f7bff;
  --accent2:    #00e5c3;
  --danger:     #ff4f6a;
  --text:       #e8eaf6;
  --text-muted: #8891b4;
  --label-bg:   #ffffff;
  --radius:     10px;
  --mono:       'Space Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --sidebar-l:  240px;
  --sidebar-r:  272px;
}

/* ============================================================
   RESET
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ============================================================
   HEADER
============================================================ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

.logo h1 {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.logo span {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 300;
  display: block;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-actions { display: flex; align-items: center; gap: 8px; }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.18s ease;
  white-space: nowrap;
}

.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover {
  background: #6b8fff;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(79,123,255,0.4);
}

.btn-export {
  background: linear-gradient(135deg, var(--accent2), #00b8a0);
  color: #0a1a18;
  font-weight: 700;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  padding: 8px 16px;
}
.btn-export:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px rgba(0,229,195,0.45);
}

.btn-danger {
  width: 100%;
  justify-content: center;
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(255,79,106,0.3);
  padding: 8px 12px;
  font-size: 12px;
  margin-top: 4px;
}
.btn-danger:hover { background: rgba(255,79,106,0.1); }

/* ============================================================
   MAIN — 3-column grid
============================================================ */
main {
  flex: 1;
  display: grid;
  grid-template-columns: var(--sidebar-l) 1fr var(--sidebar-r);
  overflow: hidden;
}

/* ============================================================
   SHARED SIDEBAR
============================================================ */
.sidebar {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-left  { border-right: 1px solid var(--border); }
.sidebar-right { border-left:  1px solid var(--border); }

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-section h2 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ============================================================
   LEFT SIDEBAR — Layers + ZPL
============================================================ */
.layer-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 30px;
}

.layer-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 9px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  color: var(--text-muted);
}
.layer-item:hover { background: var(--surface2); color: var(--text); }
.layer-item.active {
  background: rgba(79,123,255,0.12);
  border-color: rgba(79,123,255,0.35);
  color: var(--text);
}

.layer-icon {
  width: 20px; height: 20px;
  background: var(--surface2);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text-muted);
}
.layer-item.active .layer-icon {
  background: rgba(79,123,255,0.2);
  color: var(--accent);
}

.layer-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}

.layer-size {
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--mono);
}

.empty-hint {
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0.55;
  text-align: center;
  padding: 10px 0;
}

.zpl-box {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent2);
  background: var(--bg);
  border-radius: 8px;
  padding: 10px;
  max-height: 180px;
  overflow-y: auto;
  line-height: 1.8;
  word-break: break-all;
  border: 1px solid var(--border);
}

/* ============================================================
   CANVAS AREA (center)
============================================================ */
.canvas-area {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background-image:
    linear-gradient(rgba(79,123,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,123,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
  position: relative;
  overflow: hidden;
}

.canvas-wrapper {
  position: relative;
}

#label-canvas {
  background: var(--label-bg);
  width: 800px;
  height: 400px;
  border-radius: 5px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.15),
    0 16px 52px rgba(0,0,0,0.55),
    0 0 0 5px rgba(255,255,255,0.03);
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  cursor: default;
  user-select: none;
  transform-origin: top left;
}

.canvas-ruler {
  position: absolute;
  bottom: -28px;
  right: 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  background: rgba(15,17,23,0.75);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* ============================================================
   TEXT ELEMENTS ON CANVAS
============================================================ */
.label-text {
  position: absolute;
  cursor: grab;
  padding: 2px 4px;
  border-radius: 3px;
  border: 1.5px dashed transparent;
  transition: border-color 0.12s, background 0.12s;
  color: #000;
  line-height: 1.2;
  white-space: pre;
  font-family: 'Arial', sans-serif;
}
.label-text:hover {
  border-color: rgba(79,123,255,0.5);
  background: rgba(79,123,255,0.05);
}
.label-text.selected {
  border-color: var(--accent) !important;
  background: rgba(79,123,255,0.07) !important;
}
.label-text.dragging { cursor: grabbing; opacity: 0.82; }

/* ============================================================
   RIGHT SIDEBAR — Editor
============================================================ */
#editor-idle {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 32px 20px;
  text-align: center;
  color: var(--text-muted);
  flex: 1;
}

.idle-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 4px;
}

#editor-idle p {
  font-size: 12px;
  line-height: 1.7;
  opacity: 0.65;
}

#editor-content { display: none; }

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.editor-header h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 600;
}
.el-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  background: rgba(79,123,255,0.12);
  border: 1px solid rgba(79,123,255,0.3);
  border-radius: 12px;
  padding: 2px 8px;
}

.field-group { margin-bottom: 13px; }

.field-group label {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 5px;
  font-weight: 500;
  letter-spacing: 0.03em;
}

.field-group input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.field-group input:focus { border-color: var(--accent); }

.field-group input[type="range"] {
  padding: 4px 0;
  border: none;
  background: transparent;
  accent-color: var(--accent);
  cursor: pointer;
}

.range-row { display: flex; align-items: center; gap: 8px; }
.range-row input[type="range"] { flex: 1; }
.range-val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent2);
  min-width: 26px;
  text-align: right;
}

.pos-row { display: flex; gap: 8px; }
.pos-row input { width: 50%; }

.toggle-row { display: flex; gap: 6px; }
.toggle-btn {
  flex: 1;
  padding: 7px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--sans);
  text-align: center;
}
.toggle-btn.active {
  background: rgba(79,123,255,0.15);
  border-color: var(--accent);
  color: var(--text);
}

.editor-divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

/* ============================================================
   SCROLLBAR
============================================================ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   TOAST
============================================================ */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.22s ease;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header>
  <div class="logo">
    <div class="logo-icon">🏷️</div>
    <div>
      <h1>ZPL Label Studio</h1>
      <span>Gerador Universal de Etiquetas</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="clearCanvas()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.85"/></svg>
      Limpar
    </button>
    <button class="btn btn-primary" onclick="addTextElement()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar Texto
    </button>
    <button class="btn btn-export" onclick="exportZPL()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      BAIXAR ARQUIVO ZPL
    </button>
  </div>
</header>

<!-- ============================================================
     MAIN — 3 columns
============================================================ -->
<main>

  <!-- LEFT SIDEBAR: Layers + ZPL preview -->
  <aside class="sidebar sidebar-left">

    <div class="sidebar-section">
      <h2>Camadas</h2>
      <div class="layer-list" id="layer-list">
        <p class="empty-hint" id="empty-hint">Nenhuma camada ainda</p>
      </div>
    </div>

    <div class="sidebar-section">
      <h2>Código ZPL</h2>
      <div class="zpl-box" id="zpl-preview">^XA&#10;^XZ</div>
    </div>

  </aside>

  <!-- CENTER: Canvas -->
  <section class="canvas-area" id="canvas-area">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <div id="label-canvas"></div>
      <div class="canvas-ruler" id="canvas-ruler">800 × 400 pts · Zebra ZPL</div>
    </div>
  </section>

  <!-- RIGHT SIDEBAR: Editor (fixed, not floating) -->
  <aside class="sidebar sidebar-right">

    <!-- Idle: nothing selected -->
    <div id="editor-idle">
      <div class="idle-icon">✏️</div>
      <p>Clique em um texto<br>na etiqueta para<br>editar suas propriedades</p>
    </div>

    <!-- Active: element selected -->
    <div id="editor-content">
      <div class="sidebar-section">
        <div class="editor-header">
          <h3>Editar Elemento</h3>
          <span class="el-badge" id="el-badge">#1</span>
        </div>

        <div class="field-group">
          <label>Conteúdo</label>
          <input type="text" id="ep-text" placeholder="Digite o texto..." oninput="updateSelectedElement()">
        </div>

        <div class="field-group">
          <label>Tamanho da fonte</label>
          <div class="range-row">
            <input type="range" id="ep-size" min="8" max="96" value="24" oninput="updateSelectedElement()">
            <span class="range-val" id="ep-size-val">24</span>
          </div>
        </div>

        <div class="field-group">
          <label>Estilo</label>
          <div class="toggle-row">
            <button class="toggle-btn" id="tb-normal" onclick="setFontWeight('normal')">Normal</button>
            <button class="toggle-btn active" id="tb-bold" onclick="setFontWeight('bold')">Bold</button>
          </div>
        </div>

        <div class="editor-divider"></div>

        <div class="field-group">
          <label>Posição — X &amp; Y (pontos ZPL)</label>
          <div class="pos-row">
            <input type="number" id="ep-x" placeholder="X" oninput="updatePosFromPanel()">
            <input type="number" id="ep-y" placeholder="Y" oninput="updatePosFromPanel()">
          </div>
        </div>

        <button class="btn btn-danger" onclick="deleteSelected()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Excluir elemento
        </button>

      </div>
    </div>

  </aside>

</main>

<div id="toast"></div>

<script>
// =============================================================
//  STATE
// =============================================================
let elements   = [];
let selectedId = null;
let idCounter  = 0;

let dragging   = false;
let dragEl     = null;
let dragOffset = { x: 0, y: 0 };

const ZPL_W = 800;
const ZPL_H = 400;

// =============================================================
//  CANVAS SCALING
//  The canvas is always 800×400 in DOM pixels (1:1 ZPL dots).
//  We scale it with CSS transform to fit the center column.
// =============================================================
function scaleCanvas() {
  const area    = document.getElementById('canvas-area');
  const canvas  = document.getElementById('label-canvas');
  const wrapper = document.getElementById('canvas-wrapper');

  const availW = area.clientWidth  - 64;
  const availH = area.clientHeight - 64;

  const scale  = Math.min(availW / ZPL_W, availH / ZPL_H, 1);

  canvas.style.transform = `scale(${scale})`;

  // Wrapper matches the visual footprint of the scaled canvas
  wrapper.style.width  = (ZPL_W * scale) + 'px';
  wrapper.style.height = (ZPL_H * scale) + 'px';

  document.getElementById('canvas-ruler').textContent =
    `800 × 400 pts · escala ${Math.round(scale * 100)}% · Zebra ZPL`;
}

window.addEventListener('resize', scaleCanvas);

// =============================================================
//  ELEMENT FACTORY
// =============================================================
function createElement(text = 'Novo Texto', x = 40, y = 40, fontSize = 24, bold = true) {
  return { id: ++idCounter, text, x, y, fontSize, bold };
}

// =============================================================
//  ADD TEXT
// =============================================================
function addTextElement() {
  const offset = (elements.length % 8) * 24;
  const el = createElement('Texto ' + idCounter, 40 + offset, 40 + offset, 28, true);
  elements.push(el);
  renderCanvas();
  updateLayerList();
  updateZPLPreview();
  selectElement(el.id);
  showToast('Texto adicionado 🎉');
}

// =============================================================
//  RENDER CANVAS  (full re-render; used on init/delete/clear)
// =============================================================
function renderCanvas() {
  const canvas = document.getElementById('label-canvas');
  canvas.innerHTML = '';

  elements.forEach(el => {
    const div = document.createElement('div');
    div.className     = 'label-text' + (el.id === selectedId ? ' selected' : '');
    div.dataset.id    = el.id;
    div.style.left       = el.x + 'px';
    div.style.top        = el.y + 'px';
    div.style.fontSize   = el.fontSize + 'px';
    div.style.fontWeight = el.bold ? 'bold' : 'normal';
    div.textContent   = el.text;

    div.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      selectElement(el.id);
      startDrag(e, div, el);
    });

    canvas.appendChild(div);
  });
}

// =============================================================
//  DRAG & DROP
//  Mouse coords must be divided by the CSS scale to get
//  the true canvas-space coordinates.
// =============================================================
function getCanvasScale() {
  const m = new DOMMatrixReadOnly(
    window.getComputedStyle(document.getElementById('label-canvas')).transform
  );
  return m.a || 1;
}

function startDrag(e, domEl, elData) {
  dragging = true;
  dragEl   = elData;

  const scale  = getCanvasScale();
  const rect   = document.getElementById('label-canvas').getBoundingClientRect();

  dragOffset.x = (e.clientX - rect.left) / scale - elData.x;
  dragOffset.y = (e.clientY - rect.top)  / scale - elData.y;

  domEl.classList.add('dragging');
  e.preventDefault();
}

document.addEventListener('mousemove', (e) => {
  if (!dragging || !dragEl) return;

  const scale  = getCanvasScale();
  const rect   = document.getElementById('label-canvas').getBoundingClientRect();

  let newX = Math.round((e.clientX - rect.left) / scale - dragOffset.x);
  let newY = Math.round((e.clientY - rect.top)  / scale - dragOffset.y);

  newX = Math.max(0, Math.min(ZPL_W - 10, newX));
  newY = Math.max(0, Math.min(ZPL_H - 10, newY));

  dragEl.x = newX;
  dragEl.y = newY;

  const domEl = document.querySelector(`[data-id="${dragEl.id}"]`);
  if (domEl) { domEl.style.left = newX + 'px'; domEl.style.top = newY + 'px'; }

  document.getElementById('ep-x').value = newX;
  document.getElementById('ep-y').value = newY;

  updateZPLPreview();
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  const domEl = document.querySelector('.dragging');
  if (domEl) domEl.classList.remove('dragging');
  dragEl = null;
});

document.getElementById('label-canvas').addEventListener('mousedown', (e) => {
  if (e.target.id === 'label-canvas') deselectAll();
});

// =============================================================
//  SELECT / DESELECT
// =============================================================
function selectElement(id) {
  // Remove previous selection indicators
  if (selectedId !== null) {
    const prev = document.querySelector(`[data-id="${selectedId}"]`);
    if (prev) prev.classList.remove('selected');
    const prevLayer = document.getElementById(`layer-item-${selectedId}`);
    if (prevLayer) prevLayer.classList.remove('active');
  }

  selectedId = id;

  const domEl = document.querySelector(`[data-id="${id}"]`);
  if (domEl) domEl.classList.add('selected');

  const layerItem = document.getElementById(`layer-item-${id}`);
  if (layerItem) layerItem.classList.add('active');

  populateEditorPanel(id);
}

function deselectAll() {
  if (selectedId !== null) {
    const prev = document.querySelector(`[data-id="${selectedId}"]`);
    if (prev) prev.classList.remove('selected');
    const prevLayer = document.getElementById(`layer-item-${selectedId}`);
    if (prevLayer) prevLayer.classList.remove('active');
  }
  selectedId = null;
  showEditorIdle();
}

// =============================================================
//  RIGHT SIDEBAR — EDITOR STATE
// =============================================================
function showEditorIdle() {
  document.getElementById('editor-idle').style.display    = 'flex';
  document.getElementById('editor-content').style.display = 'none';
}

function populateEditorPanel(id) {
  const el = elements.find(e => e.id === id);
  if (!el) { showEditorIdle(); return; }

  document.getElementById('editor-idle').style.display    = 'none';
  document.getElementById('editor-content').style.display = 'block';

  document.getElementById('el-badge').textContent        = '#' + el.id;
  document.getElementById('ep-text').value               = el.text;
  document.getElementById('ep-size').value               = el.fontSize;
  document.getElementById('ep-size-val').textContent     = el.fontSize;
  document.getElementById('ep-x').value                  = el.x;
  document.getElementById('ep-y').value                  = el.y;

  document.getElementById('tb-normal').classList.toggle('active', !el.bold);
  document.getElementById('tb-bold').classList.toggle('active',    el.bold);
}

// =============================================================
//  UPDATE FROM EDITOR PANEL
// =============================================================
function updateSelectedElement() {
  if (!selectedId) return;
  const el = elements.find(e => e.id === selectedId);
  if (!el) return;

  el.text     = document.getElementById('ep-text').value || ' ';
  el.fontSize = parseInt(document.getElementById('ep-size').value);
  document.getElementById('ep-size-val').textContent = el.fontSize;

  const domEl = document.querySelector(`[data-id="${selectedId}"]`);
  if (domEl) {
    domEl.textContent    = el.text;
    domEl.style.fontSize = el.fontSize + 'px';
  }

  const layerItem = document.getElementById(`layer-item-${selectedId}`);
  if (layerItem) {
    const lbl     = layerItem.querySelector('.layer-label');
    const sizeEl  = layerItem.querySelector('.layer-size');
    if (lbl)    lbl.textContent    = el.text;
    if (sizeEl) sizeEl.textContent = el.fontSize + 'pt';
  }

  updateZPLPreview();
}

function updatePosFromPanel() {
  if (!selectedId) return;
  const el = elements.find(e => e.id === selectedId);
  if (!el) return;

  const nx = parseInt(document.getElementById('ep-x').value);
  const ny = parseInt(document.getElementById('ep-y').value);
  if (!isNaN(nx)) el.x = Math.max(0, Math.min(ZPL_W, nx));
  if (!isNaN(ny)) el.y = Math.max(0, Math.min(ZPL_H, ny));

  const domEl = document.querySelector(`[data-id="${selectedId}"]`);
  if (domEl) { domEl.style.left = el.x + 'px'; domEl.style.top = el.y + 'px'; }

  updateZPLPreview();
}

function setFontWeight(w) {
  if (!selectedId) return;
  const el = elements.find(e => e.id === selectedId);
  if (!el) return;

  el.bold = (w === 'bold');
  document.getElementById('tb-normal').classList.toggle('active', !el.bold);
  document.getElementById('tb-bold').classList.toggle('active',    el.bold);

  const domEl = document.querySelector(`[data-id="${selectedId}"]`);
  if (domEl) domEl.style.fontWeight = el.bold ? 'bold' : 'normal';

  updateZPLPreview();
}

// =============================================================
//  DELETE
// =============================================================
function deleteSelected() {
  if (!selectedId) return;
  elements   = elements.filter(e => e.id !== selectedId);
  selectedId = null;
  showEditorIdle();
  renderCanvas();
  updateLayerList();
  updateZPLPreview();
  showToast('Elemento removido');
}

// =============================================================
//  CLEAR ALL
// =============================================================
function clearCanvas() {
  if (elements.length === 0) return;
  if (!confirm('Limpar todos os elementos?')) return;
  elements   = [];
  selectedId = null;
  idCounter  = 0;
  showEditorIdle();
  renderCanvas();
  updateLayerList();
  updateZPLPreview();
  showToast('Canvas limpo');
}

// =============================================================
//  LAYER LIST
// =============================================================
function updateLayerList() {
  const list = document.getElementById('layer-list');
  if (!list) return;

  list.querySelectorAll('.layer-item').forEach(n => n.remove());

  const hint = document.getElementById('empty-hint');

  if (elements.length === 0) {
    if (hint) hint.style.display = 'block';
    return;
  }

  if (hint) hint.style.display = 'none';

  [...elements].reverse().forEach(el => {
    const item     = document.createElement('div');
    item.id        = `layer-item-${el.id}`;
    item.className = 'layer-item' + (el.id === selectedId ? ' active' : '');
    item.innerHTML = `
      <div class="layer-icon">T</div>
      <div class="layer-label">${escHtml(el.text)}</div>
      <div class="layer-size">${el.fontSize}pt</div>
    `;
    item.addEventListener('click', () => selectElement(el.id));
    list.appendChild(item);
  });
}

// =============================================================
//  ZPL GENERATION  (1px canvas = 1 ZPL dot)
// =============================================================
function toZPL() {
  const lines = ['^XA', '^CI28'];

  elements.forEach(el => {
    const x        = Math.round(el.x);
    const y        = Math.round(el.y);
    const fh       = Math.round(el.fontSize);
    const fw       = Math.round(el.fontSize * (el.bold ? 0.65 : 0.55));
    const safeText = el.text.replace(/\^/g, '^5E');

    lines.push(`^FO${x},${y}`);
    lines.push(`^A0N,${fh},${fw}`);
    lines.push(`^FD${safeText}^FS`);
  });

  lines.push('^XZ');
  return lines.join('\n');
}

function updateZPLPreview() {
  const box = document.getElementById('zpl-preview');
  if (box) box.textContent = toZPL();
}

// =============================================================
//  EXPORT ZPL
// =============================================================
function exportZPL() {
  if (elements.length === 0) {
    showToast('⚠️ Adicione elementos antes de exportar');
    return;
  }
  const blob = new Blob([toZPL()], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'etiqueta_zebra.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Arquivo ZPL exportado!');
}

// =============================================================
//  UTILS
// =============================================================
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// =============================================================
//  INIT
// =============================================================
(function init() {
  elements.push(createElement('Trabalhe', 40, 40, 32, true));
  elements.push(createElement('Isso mesmo trabalhe', 40, 100, 18, false));
  elements.push(createElement('Trabalhe mais', 40, 140, 18, false));

  scaleCanvas();
  renderCanvas();
  updateLayerList();
  updateZPLPreview();
  showEditorIdle();
})();
</script>
