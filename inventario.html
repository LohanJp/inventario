<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Inventário Scanner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #f0b429;
      --gold-dim:   rgba(240,180,41,0.15);
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --border:     #222;
      --border-lit: #333;
      --text:       #e8e3d8;
      --text-muted: #888;
      --text-dim:   #444;
      --red:        #ff6b6b;
      --red-dim:    #3a2020;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    #header .label {
      font-size: 0.62rem;
      color: var(--gold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.02em; }
    #counter-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
    }
    #counter {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dim);
      line-height: 1;
      text-align: right;
      transition: color 0.3s;
    }
    #counter.active { color: var(--gold); }

    .section-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Camera ── */
    #camera-section { padding: 16px 20px 0; }

    #camera-shell {
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--border);
      transition: border-color 0.3s;
    }
    #camera-shell.active { border-color: var(--gold); }

    #qr-reader { width: 100%; }
    #qr-reader__dashboard,
    #qr-reader__status_span,
    #qr-reader__camera_permission_button,
    #qr-reader__filescan_input { display: none !important; }
    #qr-reader video { border-radius: 8px; display: block; }

    #cam-badge-top {
      display: none;
      position: absolute;
      top: 8px; left: 0; right: 0;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #cam-badge-top span {
      background: rgba(0,0,0,0.65);
      color: var(--gold);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }
    #cam-badge-bottom {
      display: none;
      position: absolute;
      bottom: 8px; left: 0; right: 0;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #cam-badge-bottom span {
      background: rgba(240,180,41,0.18);
      color: var(--gold);
      border: 1px solid rgba(240,180,41,0.4);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 4px 14px;
      border-radius: 20px;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #cam-spinner {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      gap: 12px;
      z-index: 20;
    }
    .spinner-ring {
      width: 28px; height: 28px;
      border: 3px solid #222;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #cam-spinner span {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #cam-error {
      display: none;
      margin: 8px 0 0;
      padding: 12px 14px;
      background: #1e0f0f;
      border: 1px solid #3a1515;
      border-radius: 6px;
      color: var(--red);
      font-size: 0.78rem;
      line-height: 1.5;
    }
    #btn-camera {
      margin-top: 10px;
      width: 100%;
      background: var(--surface);
      color: var(--gold);
      border: 2px solid #3a2e00;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      padding: 13px 20px;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    #btn-camera.stop { color: var(--red); border-color: var(--red-dim); }
    #btn-camera:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Divider ── */
    #divider {
      margin: 16px 20px;
      border-top: 1px dashed var(--border);
      position: relative;
    }
    #divider span {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: var(--bg);
      padding: 0 10px;
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Inputs ── */
    #input-section { padding: 0 20px 14px; }
    .input-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      margin-bottom: 10px;
    }
    .field-label {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .scanner-input {
      background: var(--surface);
      border: 2px solid var(--border-lit);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.05rem;
      padding: 13px 14px;
      border-radius: 6px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
      letter-spacing: 0.05em;
      -webkit-appearance: none;
    }
    .scanner-input:focus { border-color: var(--gold); }
    .scanner-input::placeholder { color: #444; }
    #qty-input { text-align: right; }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--gold);
      color: #0f0f0f;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
      padding: 17px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: 100%;
      min-height: 54px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #ffc53d; }
    .btn-primary:active { transform: scale(0.97); }

    #action-row {
      padding: 0 20px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 14px 16px;
      border: 2px solid var(--border-lit);
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 54px;
      transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-danger {
      background: transparent;
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 14px 16px;
      border: 2px solid var(--red-dim);
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 54px;
      transition: border-color 0.15s;
    }
    .btn-danger:hover { border-color: var(--red); }
    .btn-danger:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Table ── */
    #list-section { padding: 0 20px 32px; }
    #list-box { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    #list-header {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      padding: 9px 14px;
      background: #141414;
      border-bottom: 1px solid var(--border);
    }
    #list-header span {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #list-header span:nth-child(2) { text-align: right; }

    #list-body { max-height: 340px; overflow-y: auto; }

    #list-empty {
      padding: 36px 14px;
      text-align: center;
      color: #2a2a2a;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .list-row {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      padding: 10px 14px;
      border-bottom: 1px solid #181818;
      align-items: center;
      transition: background 0.15s;
    }
    .list-row:nth-child(even) { background: rgba(255,255,255,0.025); }
    .list-row:hover { background: rgba(240,180,41,0.06); }

    .row-code {
      font-size: 0.86rem;
      letter-spacing: 0.04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 8px;
      color: var(--text-muted);
    }
    .list-row.new .row-code { color: var(--gold); }

    .row-qty {
      font-size: 0.88rem;
      text-align: right;
      color: var(--text);
      padding-right: 6px;
    }

    /* ── Delete button per row ── */
    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: #3a2020;
      font-size: 0.95rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .btn-del:hover { color: var(--red); background: rgba(255,107,107,0.12); }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      background: var(--gold);
      color: #0f0f0f;
      font-size: 0.58rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      margin-left: 6px;
      vertical-align: middle;
    }
    .badge-sum {
      background: #2a9d8f;
      color: #fff;
    }
    .list-row.updated .row-code { color: #2a9d8f; }
    .list-row.updated .row-qty  { color: #2a9d8f; }

    /* ── Animations ── */
    @keyframes flashRow {
      0%   { background: rgba(240,180,41,0.22); }
      100% { background: transparent; }
    }
    .flash-anim { animation: flashRow 0.5s ease forwards; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div>
      <div class="label">▸ Scanner Ativo</div>
      <h1>INVENTÁRIO</h1>
    </div>
    <div>
      <div id="counter-label">Capturados</div>
      <div id="counter">000</div>
    </div>
  </div>

  <!-- Camera -->
  <div id="camera-section">
    <div class="section-label">Leitor de câmera</div>
    <div id="camera-shell">
      <div id="qr-reader"></div>
      <div id="cam-badge-top"><span>● CÂMERA ATIVA</span></div>
      <div id="cam-badge-bottom"><span id="last-code-label"></span></div>
      <div id="cam-spinner">
        <div class="spinner-ring"></div>
        <span>Iniciando câmera…</span>
      </div>
    </div>
    <div id="cam-error"></div>
    <button id="btn-camera" onclick="toggleCamera()">◉ Ativar Câmera</button>
  </div>

  <!-- Divider -->
  <div id="divider"><span>ou digitar</span></div>

  <!-- Inputs -->
  <div id="input-section">
    <div class="input-row">
      <div>
        <div class="field-label">Código de barras</div>
        <input id="barcode-input" class="scanner-input"
          placeholder="Escanear ou digitar…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="handleBarcodeKey(event)" />
      </div>
      <div>
        <div class="field-label">Qtd.</div>
        <input id="qty-input" class="scanner-input"
          placeholder="1" type="number" step="any" min="0"
          onkeydown="handleQtyKey(event)" />
      </div>
    </div>
    <button class="btn-primary" onclick="addItem()">+ Adicionar Item</button>
  </div>

  <!-- Actions -->
  <div id="action-row">
    <button id="btn-txt"   class="btn-secondary" onclick="generateTxt()" disabled>↓ Gerar TXT</button>
    <button id="btn-clear" class="btn-danger"     onclick="clearList()"   disabled>✕ Limpar Tudo</button>
  </div>

  <!-- List -->
  <div id="list-section">
    <div id="list-box">
      <div id="list-header">
        <span>Código</span>
        <span>Qtd.</span>
        <span></span>
      </div>
      <div id="list-body">
        <div id="list-empty">— nenhum item capturado —</div>
      </div>
    </div>
  </div>

<script>
  /* ═══════════════════════════════════════════
     CONSTANTS & STATE
  ═══════════════════════════════════════════ */
  const STORAGE_KEY = 'inventario_items_v1';

  let items = [];
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) items = JSON.parse(saved);
  } catch(_) { items = []; }

  let scannerInstance = null;
  let cameraState = 'idle';   // idle | starting | active | error
  let cooldown = false;

  /* ═══════════════════════════════════════════
     LOCALSTORAGE
  ═══════════════════════════════════════════ */
  function saveToStorage() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(_) {}
  }

  /* ═══════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════ */
  function formatQty(value) {
    const num = parseFloat(value);
    if (isNaN(num) || value === '' || value === null) return (1).toFixed(3);
    return num.toFixed(3);
  }

  function vibrate() {
    try { navigator.vibrate && navigator.vibrate(120); } catch(_) {}
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function focusBarcode() { document.getElementById('barcode-input').focus(); }
  function focusQty() {
    const q = document.getElementById('qty-input');
    q.focus(); q.select();
  }

  /* ═══════════════════════════════════════════
     UI / COUNTER
  ═══════════════════════════════════════════ */
  function updateUI() {
    const counter = document.getElementById('counter');
    counter.textContent = String(items.length).padStart(3, '0');
    counter.classList.toggle('active', items.length > 0);
    document.getElementById('btn-txt').disabled   = items.length === 0;
    document.getElementById('btn-clear').disabled = items.length === 0;
  }

  /* ═══════════════════════════════════════════
     FLASH ANIMATION
  ═══════════════════════════════════════════ */
  function flashRow(el) {
    el.classList.remove('flash-anim');
    void el.offsetWidth;
    el.classList.add('flash-anim');
    setTimeout(() => el.classList.remove('flash-anim'), 500);
  }

  /* ═══════════════════════════════════════════
     LIST — FULL REBUILD
     highlightIndex = items[] index to highlight, or -1 for none
     highlightMode  = 'new' (inserted) | 'updated' (qty summed)
  ═══════════════════════════════════════════ */
  function renderList(highlightIndex, highlightMode) {
    const body = document.getElementById('list-body');
    const mode = highlightMode || 'new';

    if (items.length === 0) {
      body.innerHTML = '<div id="list-empty">— nenhum item capturado —</div>';
      return;
    }

    body.innerHTML = '';

    // Show newest first (reverse order)
    for (let i = items.length - 1; i >= 0; i--) {
      const item      = items[i];
      const isHit     = (i === highlightIndex);
      const isUpdated = isHit && mode === 'updated';
      const isNew     = isHit && mode === 'new';

      const row = document.createElement('div');
      row.className = 'list-row' + (isNew ? ' new' : '') + (isUpdated ? ' updated' : '');

      let badge = '';
      if (isNew)     badge = '<span class="badge">novo</span>';
      if (isUpdated) badge = '<span class="badge badge-sum">+soma</span>';

      row.innerHTML =
        '<span class="row-code">' + escHtml(item.code) + badge + '</span>' +
        '<span class="row-qty">'  + escHtml(item.qty)  + '</span>' +
        '<button class="btn-del" title="Excluir" onclick="deleteItem(' + i + ')">✕</button>';

      body.appendChild(row);
      if (isHit) flashRow(row);
    }
  }

  /* ═══════════════════════════════════════════
     ADD ITEM
  ═══════════════════════════════════════════ */
  function addItem() {
    const barcodeEl = document.getElementById('barcode-input');
    const qtyEl     = document.getElementById('qty-input');
    const code      = barcodeEl.value.trim();
    if (!code) { barcodeEl.focus(); return; }

    const incomingQty = parseFloat(qtyEl.value) || 1;

    barcodeEl.value = '';
    qtyEl.value     = '';

    const existingIndex = items.findIndex(function(item) { return item.code === code; });

    if (existingIndex !== -1) {
      const currentQty = parseFloat(items[existingIndex].qty) || 0;
      items[existingIndex].qty = (currentQty + incomingQty).toFixed(3);
      saveToStorage();
      renderList(existingIndex, 'updated');
    } else {
      items.push({ code: code, qty: incomingQty.toFixed(3) });
      saveToStorage();
      renderList(items.length - 1, 'new');
    }

    updateUI();
    focusBarcode();
  }

  function handleBarcodeKey(e) { if (e.key === 'Enter') addItem(); }
  function handleQtyKey(e)     { if (e.key === 'Enter') addItem(); }

  /* ═══════════════════════════════════════════
     DELETE SINGLE ITEM
  ═══════════════════════════════════════════ */
  function deleteItem(index) {
    items.splice(index, 1);
    saveToStorage();
    renderList(-1);
    updateUI();
  }

  /* ═══════════════════════════════════════════
     GENERATE TXT  — separator: single space
  ═══════════════════════════════════════════ */
  function generateTxt() {
    if (!items.length) return;
    const content = items.map(i => i.code + ' ' + i.qty).join('\n');
    const blob = new Blob([content], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'inventario_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ═══════════════════════════════════════════
     CLEAR LIST  — with confirmation dialog
  ═══════════════════════════════════════════ */
  function clearList() {
    if (!items.length) return;
    if (!confirm('Apagar toda a lista de captura?\n\nEsta ação não pode ser desfeita.')) return;
    items = [];
    saveToStorage();
    renderList(-1);
    updateUI();
    focusBarcode();
  }

  /* ═══════════════════════════════════════════
     CAMERA STATE MACHINE
  ═══════════════════════════════════════════ */
  function setCameraState(state) {
    cameraState = state;
    const shell    = document.getElementById('camera-shell');
    const spinner  = document.getElementById('cam-spinner');
    const topBadge = document.getElementById('cam-badge-top');
    const botBadge = document.getElementById('cam-badge-bottom');
    const btn      = document.getElementById('btn-camera');
    const errBox   = document.getElementById('cam-error');

    // Reset all
    shell.classList.remove('active');
    spinner.style.display  = 'none';
    topBadge.style.display = 'none';
    botBadge.style.display = 'none';
    btn.disabled = false;
    btn.classList.remove('stop');

    if (state === 'starting') {
      spinner.style.display = 'flex';
      btn.disabled = true;
      btn.textContent = 'Aguarde…';
      errBox.style.display = 'none';
    } else if (state === 'active') {
      shell.classList.add('active');
      topBadge.style.display = 'flex';
      btn.classList.add('stop');
      btn.textContent = '◼ Desligar Câmera';
      errBox.style.display = 'none';
    } else if (state === 'error') {
      btn.textContent = '◉ Ativar Câmera';
    } else {
      // idle
      btn.textContent = '◉ Ativar Câmera';
      errBox.style.display = 'none';
    }
  }

  function showCamError(msg) {
    const box = document.getElementById('cam-error');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }

  /* ═══════════════════════════════════════════
     ON CODE DETECTED — auto-stop then focus qty
  ═══════════════════════════════════════════ */
  async function onCodeDetected(code) {
    if (cooldown) return;
    cooldown = true;
    setTimeout(() => { cooldown = false; }, 1500);

    // 1. Stop camera immediately
    await stopCamera();

    // 2. Brief confirmation badge below viewfinder
    const botBadge = document.getElementById('cam-badge-bottom');
    const label    = document.getElementById('last-code-label');
    label.textContent = '✓ ' + code;
    botBadge.style.display = 'flex';
    setTimeout(() => { botBadge.style.display = 'none'; }, 2500);

    // 3. Fill barcode field
    document.getElementById('barcode-input').value = code;

    // 4. Vibrate
    vibrate();

    // 5. Move focus to qty field
    setTimeout(focusQty, 80);
  }

  /* ═══════════════════════════════════════════
     START / STOP / TOGGLE CAMERA
  ═══════════════════════════════════════════ */
  async function startCamera() {
    setCameraState('starting');
    try {
      const instance = new Html5Qrcode('qr-reader');
      scannerInstance = instance;

      const formats = [];
      const SF = Html5QrcodeSupportedFormats;
      if (SF) {
        [SF.EAN_13, SF.EAN_8, SF.CODE_128, SF.CODE_39,
         SF.UPC_A, SF.UPC_E, SF.QR_CODE]
          .forEach(f => { if (f !== undefined) formats.push(f); });
      }

      const config = {
        fps: 12,
        qrbox: { width: 260, height: 120 },
        aspectRatio: 1.777,
        ...(formats.length ? { formatsToSupport: formats } : {})
      };

      await instance.start(
        { facingMode: 'environment' },
        config,
        onCodeDetected,
        () => {}   // per-frame failures — silent
      );
      setCameraState('active');
    } catch (err) {
      scannerInstance = null;
      const msg = (err && (err.message || String(err))) || '';
      let friendly;
      if (/NotAllowed|Permission/i.test(msg)) {
        friendly = 'Permissão de câmera negada. Habilite nas configurações do navegador.';
      } else if (/NotFound|device not found/i.test(msg)) {
        friendly = 'Nenhuma câmera encontrada neste dispositivo.';
      } else {
        friendly = 'Erro ao acessar câmera: ' + (msg || 'desconhecido');
      }
      setCameraState('error');
      showCamError(friendly);
    }
  }

  async function stopCamera() {
    if (scannerInstance) {
      try { await scannerInstance.stop(); } catch(_) {}
      scannerInstance = null;
    }
    setCameraState('idle');
  }

  function toggleCamera() {
    if (cameraState === 'active') {
      stopCamera();
    } else if (cameraState === 'idle' || cameraState === 'error') {
      startCamera();
    }
  }

  /* ═══════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', () => {
    renderList(-1);        // restore from localStorage
    updateUI();
    setTimeout(focusBarcode, 100);
  });
</script>
</body>
